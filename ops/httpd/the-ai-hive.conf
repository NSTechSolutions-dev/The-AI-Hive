<VirtualHost *:80>
    ServerName theaihive.io
    ServerAlias www.theaihive.io

    DocumentRoot /var/www/the-ai-hive
    DirectoryIndex index.html

    <Directory /var/www/the-ai-hive>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Permissions-Policy "geolocation=(), microphone=(), camera=()"

    ErrorLog /var/log/the-ai-hive-httpd-error.log
    CustomLog /var/log/the-ai-hive-httpd-access.log combined
</VirtualHost>
